<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MS Global Visa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a1628 0%, #1a2d4a 50%, #0d1f3c 100%);
            overflow: hidden;
        }
        .bg-pattern {
            position: fixed; inset: 0; z-index: 0;
            background-image: radial-gradient(rgba(204,142,74,0.08) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .login-container {
            position: relative; z-index: 1;
            width: 420px; max-width: 92%;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-logo {
            text-align: center; margin-bottom: 32px;
        }
        .login-logo .icon-circle {
            width: 70px; height: 70px; border-radius: 50%;
            background: linear-gradient(135deg, #cc8e4a, #a87640);
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(204,142,74,0.3);
        }
        .login-logo .icon-circle i { font-size: 28px; color: #0a1628; }
        .login-logo h1 { color: #fff; font-size: 1.5rem; font-weight: 700; }
        .login-logo h1 span { color: #cc8e4a; }
        .login-logo p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 6px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label {
            display: block; color: rgba(255,255,255,0.7); font-size: 0.8rem;
            font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
        }
        .input-wrap {
            position: relative; display: flex; align-items: center;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; transition: all 0.3s;
        }
        .input-wrap:focus-within { border-color: #cc8e4a; background: rgba(204,142,74,0.06); }
        .input-wrap i { color: rgba(255,255,255,0.4); padding: 0 14px; font-size: 1rem; }
        .input-wrap:focus-within i { color: #cc8e4a; }
        .input-wrap input {
            flex: 1; background: transparent; border: none; outline: none;
            color: #fff; font-size: 0.95rem; padding: 14px 14px 14px 0;
            font-family: 'Inter', sans-serif;
        }
        .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }
        .toggle-pw {
            background: none; border: none; color: rgba(255,255,255,0.4);
            cursor: pointer; padding: 0 14px; font-size: 1rem; transition: color 0.3s;
        }
        .toggle-pw:hover { color: #cc8e4a; }
        .error-msg {
            display: none; color: #ff6b6b; font-size: 0.82rem; margin-top: 8px;
            padding: 10px 14px; background: rgba(255,107,107,0.1);
            border-radius: 8px; border-left: 3px solid #ff6b6b;
        }
        .error-msg.show { display: flex; align-items: center; gap: 8px; }
        .login-btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #cc8e4a, #a87640);
            color: #0a1628; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s; margin-top: 8px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(204,142,74,0.35); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .back-link {
            display: block; text-align: center; margin-top: 24px;
            color: rgba(255,255,255,0.4); font-size: 0.85rem; text-decoration: none; transition: color 0.3s;
        }
        .back-link:hover { color: #cc8e4a; }
        .attempts-warning {
            display: none; text-align: center; color: #ff6b6b;
            font-size: 0.8rem; margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="login-container">
        <div class="login-logo">
            <div class="icon-circle"><i class="fas fa-shield-alt"></i></div>
            <h1>MS Global <span>Visa</span></h1>
            <p>Admin Panel Login</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Enter username" autocomplete="off" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter password" required>
                    <button type="button" class="toggle-pw" onclick="togglePassword()"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle"></i> <span></span></div>
            <button type="submit" class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Log In</button>
            <div class="attempts-warning" id="attemptsWarn"></div>
        </form>
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>

    <script>
        // ─── Admin Credentials (change these) ───
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'MsGlobal@2026';

        let attempts = 0;
        const MAX_ATTEMPTS = 5;

        function togglePassword() {
            const pw = document.getElementById('password');
            const icon = document.querySelector('.toggle-pw i');
            if (pw.type === 'password') { pw.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
            else { pw.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.querySelector('span').textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (attempts >= MAX_ATTEMPTS) {
                showError('Too many failed attempts. Please try again later.');
                return;
            }

            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                // Set session
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_login_time', Date.now().toString());
                window.location.href = 'dashboard.html';
            } else {
                attempts++;
                const remaining = MAX_ATTEMPTS - attempts;
                showError('Invalid username or password.');
                if (remaining <= 2 && remaining > 0) {
                    const warn = document.getElementById('attemptsWarn');
                    warn.style.display = 'block';
                    warn.textContent = `${remaining} attempt(s) remaining`;
                }
                if (attempts >= MAX_ATTEMPTS) {
                    document.getElementById('loginBtn').disabled = true;
                    showError('Account locked. Try again after 5 minutes.');
                    setTimeout(() => { attempts = 0; document.getElementById('loginBtn').disabled = false; }, 300000);
                }
            }
        });

        // If already logged in, redirect
        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
